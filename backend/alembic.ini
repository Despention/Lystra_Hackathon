# Alembic configuration for Lystra TZ Analyzer.
# Database URL is resolved at runtime from app.config.settings.database_url —
# so this file does NOT hard-code one. Override with ALEMBIC_DATABASE_URL env
# if you need to target a different DB than the app.

[alembic]
script_location = alembic
prepend_sys_path = .

# Use YYYYMMDD_HHMM as the revision slug prefix for easier ordering.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Version path separator (use os-specific)
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
